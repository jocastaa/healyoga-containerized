version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
#  HEAL YOGA – Cloud-Native Microservices
#  Single entry point: http://localhost:8080
#  Run all: docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── API Gateway (port 8080) — single entry point ─────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: healy-api-gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - AUTH_SERVICE_URL=http://auth-service:3002
      - PROGRESS_SERVICE_URL=http://progress-service:3000
      - POSE_SERVICE_URL=http://pose-service:3001
      - NOTIFICATION_SERVICE_URL=http://notification-service:3003
    depends_on:
      - auth-service
      - progress-service
      - pose-service
      - notification-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Auth Service (port 3002) ──────────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: healy-auth-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - RESET_PASSWORD_REDIRECT_URL=${RESET_PASSWORD_REDIRECT_URL:-https://healyoga-web.web.app/reset-password}
    restart: unless-stopped

  # ── Progress Service (port 3000) ──────────────────────────────────────────────
  progress-service:
    build:
      context: ./progress-service
      dockerfile: Dockerfile
    container_name: healy-progress-service
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    restart: unless-stopped

  # ── Pose Service (port 3001) ──────────────────────────────────────────────────
  pose-service:
    build:
      context: ./pose-service
      dockerfile: Dockerfile
    container_name: healy-pose-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    restart: unless-stopped

  # ── Notification Service (port 3003) ──────────────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: healy-notification-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    restart: unless-stopped
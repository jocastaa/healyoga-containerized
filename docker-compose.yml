version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
#  HEAL YOGA – Cloud-Native Microservices
#  Single external entry point: http://localhost:8080
#  Individual services are NOT exposed externally — internal network only
#  Run: docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

networks:
  healy-internal:
    driver: bridge

services:

  # ── API Gateway — ONLY external entry point ───────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: healy-api-gateway
    ports:
      - "8080:8080"          # ← only exposed port
    environment:
      - PORT=8080
      - AUTH_SERVICE_URL=http://auth-service:3002
      - PROGRESS_SERVICE_URL=http://progress-service:3000
      - POSE_SERVICE_URL=http://pose-service:3001
      - NOTIFICATION_SERVICE_URL=http://notification-service:3003
    depends_on:
      - auth-service
      - progress-service
      - pose-service
      - notification-service
    networks:
      - healy-internal
    restart: unless-stopped

  # ── Auth Service — internal only, no external port ────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: healy-auth-service
    expose:
      - "3002"               # internal only
    environment:
      - PORT=3002
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - RESET_PASSWORD_REDIRECT_URL=${RESET_PASSWORD_REDIRECT_URL:-https://healyoga-web.web.app/reset-password}
    networks:
      - healy-internal
    restart: unless-stopped

  # ── Progress Service — internal only, no external port ───────────────────
  progress-service:
    build:
      context: ./progress-service
      dockerfile: Dockerfile
    container_name: healy-progress-service
    expose:
      - "3000"               # internal only
    environment:
      - PORT=3000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    networks:
      - healy-internal
    restart: unless-stopped

  # ── Pose Service — internal only, no external port ────────────────────────
  pose-service:
    build:
      context: ./pose-service
      dockerfile: Dockerfile
    container_name: healy-pose-service
    expose:
      - "3001"               # internal only
    environment:
      - PORT=3001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    networks:
      - healy-internal
    restart: unless-stopped

  # ── Notification Service — internal only, no external port ───────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: healy-notification-service
    expose:
      - "3003"               # internal only
    environment:
      - PORT=3003
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    networks:
      - healy-internal
    restart: unless-stopped